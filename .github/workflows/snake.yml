# Generate a contribution graph snake that "eats" your GitHub contributions.
# Runs on schedule and can be triggered manually from the Actions tab.
# See: https://github.com/Platane/snk

name: Generate Snake

on:
  schedule:
    # Every 6 hours (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake from contribution graph
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: AKSH2002
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake.gif

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
